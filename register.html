<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roomsy | Signup</title>
    <link rel="icon" href="assets/logo.jpg" type="image/x-icon" />

    <!-- Bootstrap + Font Awesome -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />

    <!-- project stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <h2>Signup / Register</h2>

        <form id="signupForm" novalidate>
          <div class="mb-3">
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Please enter your email address"
              required
            />
          </div>

          <button type="submit" class="auth-btn mb-2">Signup</button>

          <div class="small-muted">
            Already have an account?
            <a href="login.html" class="login-link">Login</a>
          </div>

          <div class="auth-divider">Or</div>

          <button type="button" class="auth-social auth-facebook">
            <i class="fa-brands fa-facebook-f me-2"></i> Continue with Facebook
          </button>

          <button type="button" class="auth-social auth-apple">
            <i class="fa-brands fa-apple me-2"></i> Continue with Apple
          </button>

          <button type="button" class="auth-social auth-google">
            <i class="fa-brands fa-google me-2"></i> Continue with Google
          </button>
        </form>
      </div>
    </div>

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Animations -->
    <script src="main.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.body.classList.add("loaded");
        setTimeout(() => {
          document.getElementById("loader").style.display = "none";
        }, 500);
      });
    </script>
  </body>
</html>
